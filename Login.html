<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>

    <!-- 
        <link> - Tag HTML usada para vincular recursos externos
        rel="stylesheet" - Especifica que o recurso vinculado é uma folha de estilo (CSS)
        href="style_login.css" - Indica o caminho (localização) do ficheiro CSS
    -->
    <link rel="stylesheet" href="style_login.css" />
  </head>
  <body>
    <h2>Introduzir dados de login</h2>
    <form>
      <!-- ⚠️ O HTML deve definir apenas a estrutura. -->
      <!-- O style="width: 450px" pode ser removido para o CSS externo controlar totalmente -->
      <!-- fieldset style="width: 450px"-->
      <fieldset>
        <legend>Dados Pessoais:</legend>
        <label for="email">Email:</label><br />
        <!--⚠️ A validação do email deve ser realizada automaticamente (ex: a@b.c). -->
        <!--Validação de email: Usando type="email" no campo "input", a validação já se torna automática e no formato a@b.c -->
        <input type="email" id="email" name="email" required />
        <br /><br />
        <label for="password">Password:</label><br />
        <input type="password" id="password" name="password" required />
        <br /><br />
        <input type="submit" value="Login" />
      </fieldset>
    </form>
  </body>
</html>
